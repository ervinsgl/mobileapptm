<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        index.html - SAP UI5 Fiori Application Entry Point
        
        Application: mobileappsc (FSM Service Confirmation)
        Theme: sap_horizon
        
        Features:
        - Loading screen with spinner (auto-hides after UI5 init or 3s timeout)
        - Mobile-optimized viewport
        - Compact density mode
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Service Confirmation</title>
    
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #loading-screen.hidden {
            display: none !important;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <script>
        // Hide loading screen
        function hideLoadingScreen() {
            var loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.classList.add('hidden');
                loadingScreen.style.display = 'none';
            }
        }
        
        // Force hide after 3 seconds (fallback)
        setTimeout(hideLoadingScreen, 3000);
    </script>
    
    <!-- UI5 Bootstrap -->
    <script
        id="sap-ui-bootstrap"
        src="https://openui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m"
        data-sap-ui-resource-roots='{"mobileappsc": "./"}'
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-frame-options="allow"
        data-sap-ui-xx-component-preload="off"
        data-sap-ui-preload=""
    ></script>
    
    <!-- UI5 Init Handler -->
    <script>
        (function waitForUI5() {
            if (window.sap && window.sap.ui && window.sap.ui.getCore) {
                sap.ui.getCore().attachInit(hideLoadingScreen);
            } else {
                setTimeout(waitForUI5, 50);
            }
        })();
        
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(hideLoadingScreen, 1000);
        });
        
        window.addEventListener('load', function() {
            setTimeout(hideLoadingScreen, 1500);
        });
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div style="font-size: 16px; margin-top: 10px;">Loading...</div>
    </div>
    
    <!-- UI5 Component Container -->
    <div
        data-sap-ui-component
        data-name="mobileappsc"
        data-id="container"
        data-settings='{"id" : "mobileappsc"}'
        data-handle-validation="true"
        style="height: 100%;"
    ></div>
    
</body>
</html>
